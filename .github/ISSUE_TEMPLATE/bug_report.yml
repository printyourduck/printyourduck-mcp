name: Bug report
description: Report a reproducible problem with the MCP server.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: checkboxes
    id: safety
    attributes:
      label: Public safety check
      options:
        - label: I did not include secrets, customer files, private file references, supplier/cost/margin details, or dashboard screenshots.
          required: true
  - type: input
    id: client
    attributes:
      label: MCP client
      placeholder: Codex CLI, Claude Code, Cursor, etc.
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use synthetic file names and redacted paths.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

