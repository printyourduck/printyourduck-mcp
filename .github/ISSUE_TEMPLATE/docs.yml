name: Documentation
description: Report confusing or missing docs.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: checkboxes
    id: safety
    attributes:
      label: Public safety check
      options:
        - label: I did not include secrets, customer files, private file references, supplier/cost/margin details, or dashboard screenshots.
          required: true
  - type: textarea
    id: issue
    attributes:
      label: Documentation issue
    validations:
      required: true

