name: Release MCP

on:
  push:
    tags:
      - mcp-v*
  workflow_dispatch:

concurrency:
  group: mcp-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: 24
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/printyourduck-mcp
  LOCAL_IMAGE_NAME: printyourduck-mcp:release-candidate
  MCP_REGISTRY_DOMAIN: printyourduck.com
  MCP_PUBLISHER_VERSION: 1.7.9
  MCP_PUBLISHER_LINUX_AMD64_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
  GITLEAKS_VERSION: 8.30.1
  GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
  TRUFFLEHOG_VERSION: 3.95.3
  TRUFFLEHOG_LINUX_AMD64_SHA256: 5d836eae522540a32ca0f1a1e00efd4c3153a52462466a4b4008fac1e6c1a548

jobs:
  checks:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.mode.outputs.publish }}
      version: ${{ steps.mode.outputs.version }}
      package_private: ${{ steps.mode.outputs.package_private }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - name: Resolve release mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          package_private="$(node -p "Boolean(require('./package.json').private)")"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#mcp-v}"
            publish="true"
          else
            version="${package_version}"
            publish="false"
          fi

          if [[ "${version}" != "${package_version}" ]]; then
            echo "::error::Release version ${version} does not match package version ${package_version}."
            exit 1
          fi

          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "package_private=${package_private}" >> "${GITHUB_OUTPUT}"

          {
            echo "### Release mode"
            echo
            echo "- package version: ${package_version}"
            echo "- resolved version: ${version}"
            echo "- publish artifacts: ${publish}"
            echo "- package private: ${package_private}"
            echo "- event: ${GITHUB_EVENT_NAME}"
            echo "- ref: ${GITHUB_REF_NAME}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install pinned MCP publisher
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          publisher_archive="/tmp/mcp-publisher.tar.gz"
          curl -sSfL "https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" -o "${publisher_archive}"
          echo "${MCP_PUBLISHER_LINUX_AMD64_SHA256}  ${publisher_archive}" | sha256sum -c -
          tar -xzf "${publisher_archive}" -C "$HOME/.local/bin" mcp-publisher
          chmod +x "$HOME/.local/bin/mcp-publisher"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate MCP Registry metadata
        run: mcp-publisher validate

      - name: Install security scanners
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"

          gitleaks_archive="/tmp/gitleaks.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o "${gitleaks_archive}"
          echo "${GITLEAKS_LINUX_X64_SHA256}  ${gitleaks_archive}" | sha256sum -c -
          tar -xzf "${gitleaks_archive}" -C "$HOME/.local/bin" gitleaks

          trufflehog_archive="/tmp/trufflehog.tar.gz"
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz" -o "${trufflehog_archive}"
          echo "${TRUFFLEHOG_LINUX_AMD64_SHA256}  ${trufflehog_archive}" | sha256sum -c -
          tar -xzf "${trufflehog_archive}" -C "$HOME/.local/bin" trufflehog
          chmod +x "$HOME/.local/bin/gitleaks" "$HOME/.local/bin/trufflehog"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run release checks
        run: pnpm check:release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build release-candidate MCP image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: ${{ env.LOCAL_IMAGE_NAME }}
          labels: |
            org.opencontainers.image.title=PrintYourDuck MCP
            org.opencontainers.image.description=Local MCP helper for PrintYourDuck manual quote review
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.mode.outputs.version }}

      - name: Scan release-candidate MCP image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.LOCAL_IMAGE_NAME }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Block publish while package is private
        if: steps.mode.outputs.publish == 'true' && steps.mode.outputs.package_private == 'true'
        run: |
          echo "::error::package.json is private. Remove private:true only when npm/GHCR/MCP Registry release is intentionally ready."
          exit 1

  release:
    if: needs.checks.outputs.publish == 'true' && needs.checks.outputs.package_private != 'true'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install pinned MCP publisher
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          publisher_archive="/tmp/mcp-publisher.tar.gz"
          curl -sSfL "https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" -o "${publisher_archive}"
          echo "${MCP_PUBLISHER_LINUX_AMD64_SHA256}  ${publisher_archive}" | sha256sum -c -
          tar -xzf "${publisher_archive}" -C "$HOME/.local/bin" mcp-publisher
          chmod +x "$HOME/.local/bin/mcp-publisher"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Authenticate to MCP Registry
        env:
          MCP_REGISTRY_PRIVATE_KEY: ${{ secrets.MCP_REGISTRY_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${MCP_REGISTRY_PRIVATE_KEY:-}" ]]; then
            echo "::error::MCP_REGISTRY_PRIVATE_KEY is required for com.printyourduck/quote registry publication."
            exit 1
          fi
          mcp-publisher login http --domain "${MCP_REGISTRY_DOMAIN}" --private-key "${MCP_REGISTRY_PRIVATE_KEY}"

      - name: Validate MCP Registry metadata
        run: mcp-publisher validate

      - name: Pack npm package
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          pack_json="$(npm pack --json --ignore-scripts)"
          filename="$(node -e "const fs=require('node:fs'); const data=JSON.parse(fs.readFileSync(0,'utf8')); process.stdout.write(data[0].filename)" <<< "${pack_json}")"
          echo "filename=${filename}" >> "${GITHUB_OUTPUT}"

      - name: Publish npm package
        shell: bash
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "${package_name}@${package_version} is already published; skipping npm publish."
            exit 0
          fi

          npm publish --access public --provenance

      - name: Attest npm package archive
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: ${{ steps.pack.outputs.filename }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish MCP image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.checks.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.checks.outputs.version }}
        run: gh release view "mcp-v${VERSION}" >/dev/null 2>&1 || gh release create "mcp-v${VERSION}" --generate-notes --verify-tag

      - name: Publish MCP Registry metadata
        env:
          MCP_REGISTRY_PRIVATE_KEY: ${{ secrets.MCP_REGISTRY_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          npm view "${package_name}@${package_version}" version >/dev/null
          mcp-publisher login http --domain "${MCP_REGISTRY_DOMAIN}" --private-key "${MCP_REGISTRY_PRIVATE_KEY}"
          mcp-publisher publish
