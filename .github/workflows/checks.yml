name: Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GITLEAKS_VERSION: 8.30.1
  GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
  TRUFFLEHOG_VERSION: 3.95.3
  TRUFFLEHOG_LINUX_AMD64_SHA256: 5d836eae522540a32ca0f1a1e00efd4c3153a52462466a4b4008fac1e6c1a548

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install security scanners
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"

          gitleaks_archive="/tmp/gitleaks.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o "${gitleaks_archive}"
          echo "${GITLEAKS_LINUX_X64_SHA256}  ${gitleaks_archive}" | sha256sum -c -
          tar -xzf "${gitleaks_archive}" -C "$HOME/.local/bin" gitleaks

          trufflehog_archive="/tmp/trufflehog.tar.gz"
          curl -sSfL "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz" -o "${trufflehog_archive}"
          echo "${TRUFFLEHOG_LINUX_AMD64_SHA256}  ${trufflehog_archive}" | sha256sum -c -
          tar -xzf "${trufflehog_archive}" -C "$HOME/.local/bin" trufflehog
          chmod +x "$HOME/.local/bin/gitleaks" "$HOME/.local/bin/trufflehog"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run release checks
        run: pnpm check:release

